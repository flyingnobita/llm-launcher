# markdownlint-cli2 config - aligned with pre-commit
gitignore: true
ignores:
  - dev-docs/**
  - CLAUDE.md
config:
  MD007:
    indent: 2 # match Prettier's Markdown nested list indent
  MD013: false # line-length: docs often exceed 80 chars
  MD036: false # no-emphasis-as-heading: allow italic for labels
  # Allow `<br>` in tables and `<a id="…">` for GitHub-compatible section anchors (emoji headings).
  MD033:
    allowed_elements: ["br", "a"]
